name: admin_app
description: "RosaFiesta Admin - Internal management app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # HTTP
  dio: ^5.4.3+1

  # Routing
  go_router: ^14.2.0

  # Fonts
  google_fonts: ^6.2.1

  # Calendar
  table_calendar: ^3.1.2

  # Charts
  fl_chart: ^0.68.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  shared_preferences: ^2.2.3

  # PDF/CSV
  pdf: ^3.10.8
  csv: ^6.0.0
  path_provider: ^2.1.3

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
